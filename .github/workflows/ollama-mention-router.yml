name: "🦙 Ollama Mention Router"
# Intercepts @copilot, @lucidia, and @blackboxprogramming mentions in issues and PRs
# and routes every request directly to Ollama on the local Pi fleet.
# Zero reliance on ChatGPT, Claude, Copilot, or any external provider.

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  issues: write
  pull-requests: write
  contents: read

jobs:
  route-to-ollama:
    name: "🦙 Route mention → Ollama"
    # Only run when one of the tracked handles is mentioned
    if: |
      contains(github.event.comment.body, '@copilot') ||
      contains(github.event.comment.body, '@lucidia') ||
      contains(github.event.comment.body, '@blackboxprogramming')
    runs-on: [self-hosted, pi]

    steps:
      - name: Extract prompt
        id: prompt
        env:
          COMMENT: ${{ github.event.comment.body }}
        run: |
          # Strip ALL @handle mentions (g flag); keep the rest as the prompt.
          # Handles: @copilot, @lucidia, @blackboxprogramming (case-insensitive)
          PROMPT=$(echo "$COMMENT" \
            | sed -E 's/@(copilot|lucidia|blackboxprogramming)[[:space:]]*/\n/gI' \
            | tr -s '\n' ' ' \
            | sed 's/^[[:space:]]*//' \
            | head -c 4000)

          if [ -z "$(echo "$PROMPT" | tr -d '[:space:]')" ]; then
            PROMPT="Hello! What can I help you with?"
          fi

          # Write to a temp file to avoid shell injection
          PROMPT_FILE=$(mktemp)
          printf '%s' "$PROMPT" > "$PROMPT_FILE"
          echo "prompt_file=$PROMPT_FILE" >> $GITHUB_OUTPUT
          echo "Prompt extracted (${#PROMPT} chars)"

      - name: Ensure Ollama is running
        run: |
          if ! command -v ollama &>/dev/null; then
            echo "Installing Ollama..."
            curl -fsSL https://ollama.com/install.sh | sh
          fi
          if ! pgrep -f 'ollama serve' &>/dev/null && ! pgrep ollama &>/dev/null; then
            ollama serve &>/tmp/ollama.log &
            echo "🚀 Ollama service started, waiting for readiness..."
          else
            echo "✅ Ollama already running"
          fi
          # Poll until Ollama responds or timeout (30s)
          for i in $(seq 1 15); do
            if curl -sf http://localhost:11434/ &>/dev/null; then
              echo "✅ Ollama ready after $((i*2))s"
              break
            fi
            sleep 2
          done

      - name: Run inference via Ollama
        id: inference
        run: |
          MODEL="llama3.2"
          PROMPT_FILE="${{ steps.prompt.outputs.prompt_file }}"

          # Check model is available; if not, attempt to pull it
          if ! ollama list 2>/dev/null | grep -q "^[[:space:]]*${MODEL}"; then
            echo "Pulling model $MODEL..."
            if ! ollama pull "$MODEL" 2>&1; then
              RESP_FILE=$(mktemp)
              printf '⚠️ Could not download model `%s` from Ollama. Check that the Pi has internet access and run the *Ollama Local LLM* workflow with action=setup.' "$MODEL" > "$RESP_FILE"
              echo "resp_file=$RESP_FILE" >> $GITHUB_OUTPUT
              rm -f "$PROMPT_FILE"
              exit 0
            fi
          fi

          # Run inference — feed prompt via stdin, capture both stdout and stderr
          RESP_FILE=$(mktemp)
          ERR_FILE=$(mktemp)
          cat "$PROMPT_FILE" | ollama run "$MODEL" 2>"$ERR_FILE" > "$RESP_FILE" || true

          if [ ! -s "$RESP_FILE" ]; then
            ERR=$(cat "$ERR_FILE" | head -5)
            printf '⚠️ Ollama returned an empty response. Error: %s\n\nMake sure the model is pulled (`ollama pull %s`) and the service is running.' "$ERR" "$MODEL" > "$RESP_FILE"
          fi

          echo "resp_file=$RESP_FILE" >> $GITHUB_OUTPUT
          rm -f "$PROMPT_FILE" "$ERR_FILE"

      - name: Post Ollama response as comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RESP_FILE: ${{ steps.inference.outputs.resp_file }}
        run: |
          RESPONSE=$(cat "$RESP_FILE")
          rm -f "$RESP_FILE"

          # Wrap response in a fenced code-quote block to prevent Markdown injection
          BODY="🦙 **Ollama** (\`llama3.2\` · local · \`$(hostname).local:11434\`):

${RESPONSE}

---
*Answered locally — no external AI provider used.*"

          # Determine issue/PR number — issue_comment sets issue.number,
          # pull_request_review_comment sets pull_request.number
          TARGET="${{ github.event.issue.number }}"
          if [ -z "$TARGET" ] || [ "$TARGET" = "0" ]; then
            TARGET="${{ github.event.pull_request.number }}"
          fi

          if ! gh issue comment "$TARGET" \
              --repo "${{ github.repository }}" \
              --body "$BODY" 2>/tmp/gh_err.txt; then
            if ! gh pr comment "$TARGET" \
                --repo "${{ github.repository }}" \
                --body "$BODY" 2>>/tmp/gh_err.txt; then
              echo "::warning::Could not post comment: $(cat /tmp/gh_err.txt)"
            fi
          fi
          rm -f /tmp/gh_err.txt

